<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IPTV Users Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0f19;
color:white;
}


.sidebar{

position:fixed;
width:260px;
height:100vh;
background:#111827;
padding:20px;

}


.logo{

font-size:28px;
font-weight:bold;
color:#00e5ff;
margin-bottom:30px;

}


.menu a{

display:block;
padding:15px;
color:white;
text-decoration:none;
border-radius:10px;
margin-bottom:10px;

}


.menu a:hover{

background:#00e5ff;
color:black;

}



.main{

margin-left:260px;
padding:25px;

}



.topbar{

background:#111827;
padding:20px;
border-radius:15px;
display:flex;
justify-content:space-between;

}



button{

background:#00e5ff;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
font-weight:bold;

}



.form-box,
.table-box{

background:#111827;
padding:20px;
border-radius:15px;
margin-top:25px;

}



input,select{

width:100%;
padding:12px;
margin:8px 0;
background:#1f2937;
border:none;
border-radius:8px;
color:white;

}


table{

width:100%;
border-collapse:collapse;
margin-top:20px;

}


th,td{

padding:15px;
border-bottom:1px solid #333;
text-align:left;

}



.delete{

background:#ff3333;
color:white;

}


.active{

color:#00ff88;

}


.expired{

color:red;

}



@media(max-width:768px){

.sidebar{
width:70px;
}

.logo{
font-size:0;
}

.main{
margin-left:70px;
}

.menu a{
font-size:0;
}

}

</style>

</head>


<body>


<div class="sidebar">


<div class="logo">
IPTV PANEL
</div>


<div class="menu">

<a href="dashboard.html">
🏠 Dashboard
</a>

<a href="users.html">
👤 Users
</a>

<a href="#">
📺 Playlist
</a>

<a href="#">
💳 Subscription
</a>

<a href="#">
🔔 Notification
</a>

</div>


</div>





<div class="main">


<div class="topbar">

<h2>
User Management
</h2>


<button onclick="logout()">
Logout
</button>


</div>





<div class="form-box">


<h2>
Add New User
</h2>


<input id="name" placeholder="User Name">


<input id="phone" placeholder="Mobile Number">


<select id="plan">

<option>
Basic
</option>

<option>
Premium
</option>

<option>
OTT Pro
</option>

</select>



<input id="expiry" type="date">



<button onclick="addUser()">
Add User
</button>


</div>







<div class="table-box">


<h2>
Users List
</h2>


<table>


<thead>

<tr>

<th>Name</th>
<th>Mobile</th>
<th>Plan</th>
<th>Expiry</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>


<tbody id="userTable">

</tbody>


</table>


</div>




</div>







<script>


// Login Check

if(localStorage.getItem("adminLogin")!="true"){

location.href="index.html";

}




let users =
JSON.parse(localStorage.getItem("users")) || [];




function addUser(){


let user={

name:document.getElementById("name").value,

phone:document.getElementById("phone").value,

plan:document.getElementById("plan").value,

expiry:document.getElementById("expiry").value

};



users.push(user);


localStorage.setItem(
"users",
JSON.stringify(users)
);


loadUsers();


}




function loadUsers(){


let table="";


users.forEach((u,index)=>{


let today=new Date();

let exp=new Date(u.expiry);


let status=
exp>=today
?
"<span class='active'>Active</span>"
:
"<span class='expired'>Expired</span>";



table+=`

<tr>

<td>${u.name}</td>

<td>${u.phone}</td>

<td>${u.plan}</td>

<td>${u.expiry}</td>

<td>${status}</td>


<td>

<button class="delete"
onclick="deleteUser(${index})">

Delete

</button>

</td>


</tr>

`;

});


document.getElementById("userTable").innerHTML=table;


}




function deleteUser(index){


users.splice(index,1);


localStorage.setItem(
"users",
JSON.stringify(users)
);


loadUsers();


}





function logout(){

localStorage.removeItem("adminLogin");

location.href="index.html";

}



loadUsers();


</script>



</body>
</html>
